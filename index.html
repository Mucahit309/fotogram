<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogram - Photo Album</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
  </head>
  <body onload="init()">
    <header>
      <div class="header-content">
        <img src="./img/logos/Capa_1.svg" alt="Fotogram Logo" class="logo" />
      </div>
    </header>

    <main id="main-container">
      <section class="hero">
        <h2>Your personal photo album</h2>
      </section>

      <section id="gallery-grid" class="gallery-grid"></section>
    </main>

<div id="overlay" class="overlay-container d-none" onclick="closeOverlayOutside(event)">
  <div class="overlay-card">
    <header class="overlay-header">
      <h3 id="overlay-title"></h3>
      <button id="close-overlay-btn" class="close-btn" onclick="closeOverlay()">
        <img src="./img/logos/x.png" alt="Close">
      </button>
    </header>

    <figure id="overlay-figure" class="overlay-figure"></figure>

    <nav class="overlay-nav">
      <button class="nav-btn" onclick="previousImage()">
        <img src="./img/logos/arrow-r.png" alt="Previous">
      </button>
      <span id="image-counter" aria-live="polite"></span>
      <button class="nav-btn" onclick="nextImage()">
        <img src="./img/logos/arrow.png" alt="Next">
      </button>
    </nav>
  </div>
</div>

    <footer>
      <div class="footer-content">
        <img src="./img/logos/Logo.svg" alt="Developer Akademie Logo" />
        <p>&copy; 2025 Developer Akademie GmbH</p>
      </div>
    </footer>

    <script src="scripts.js"></script>
  </body>
</html>
